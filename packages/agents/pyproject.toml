[project]
name = "sentinel-agents"
version = "0.1.0"
description = "Sentinel investigation agents (LangChain + LiteLLM)."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7.0",
    "structlog>=24.1.0",
    "langchain>=0.3.0",
    "langchain-litellm>=0.2.0",
    "litellm>=1.55.0",
    "langgraph>=0.6.0",
    "langgraph-checkpoint-postgres>=2.0.0",
    "psycopg[binary,pool]>=3.2.0",
    "numpy>=1.26.0",
    "scipy>=1.11.0",
    "redis>=5.0.0",
    "langfuse>=2.50.0,<3",
]
