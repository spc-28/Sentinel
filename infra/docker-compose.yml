name: sentinel

# Local development datastores. The API and worker run on the host via `uv`
# (see the Makefile) and connect to these over published ports.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-sentinelpass}
    ports:
      - "7474:7474"   # HTTP browser
      - "${NEO4J_PORT:-7687}:7687"  # Bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}",
             "-p", "${NEO4J_PASSWORD:-sentinelpass}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # Observability (Part 12). Opt-in — only starts with `--profile observability`.
  langfuse-db:
    image: postgres:16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfusedb:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    depends_on:
      - langfuse-db
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3000}
      NEXTAUTH_SECRET: sentinel-dev-nextauth-secret
      SALT: sentinel-dev-salt
      TELEMETRY_ENABLED: "false"
      # Headless init: provisions a project + these exact keys on first boot,
      # so LANGFUSE_PUBLIC_KEY/SECRET_KEY in .env just work with no UI setup.
      LANGFUSE_INIT_ORG_ID: sentinel
      LANGFUSE_INIT_PROJECT_ID: sentinel
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-sentinel-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-sentinel-dev
      LANGFUSE_INIT_USER_EMAIL: dev@sentinel.local
      LANGFUSE_INIT_USER_PASSWORD: sentineldev

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
  langfusedb:
